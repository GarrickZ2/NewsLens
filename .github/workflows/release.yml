name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v[0-9]+.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Create a draft GitHub Release
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      - name: Create or reset Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if gh release view "$TAG" &>/dev/null; then
            gh release edit "$TAG" --draft
            gh release view "$TAG" --json assets --jq '.assets[].name' \
              | xargs -I{} gh release delete-asset "$TAG" "{}" --yes || true
          else
            gh release create "$TAG" --draft --title "$TAG"
          fi

  # Build frontend once, share across build jobs
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          retention-days: 1

  # macOS Apple Silicon (arm64)
  build-macos-arm:
    needs: [create-release, build-frontend]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: macos-arm
      - name: Build
        run: cargo build --release --target aarch64-apple-darwin
        working-directory: src-tauri
      - name: Package
        run: |
          cd src-tauri/target/aarch64-apple-darwin/release
          tar -czf newslens-${{ needs.create-release.outputs.tag }}-aarch64-apple-darwin.tar.gz newslens
      - name: Upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.create-release.outputs.tag }} --clobber \
            src-tauri/target/aarch64-apple-darwin/release/newslens-${{ needs.create-release.outputs.tag }}-aarch64-apple-darwin.tar.gz

  # macOS Intel (x86_64)
  build-macos-intel:
    needs: [create-release, build-frontend]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: macos-intel
      - name: Build
        run: cargo build --release --target x86_64-apple-darwin
        working-directory: src-tauri
      - name: Package
        run: |
          cd src-tauri/target/x86_64-apple-darwin/release
          tar -czf newslens-${{ needs.create-release.outputs.tag }}-x86_64-apple-darwin.tar.gz newslens
      - name: Upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.create-release.outputs.tag }} --clobber \
            src-tauri/target/x86_64-apple-darwin/release/newslens-${{ needs.create-release.outputs.tag }}-x86_64-apple-darwin.tar.gz

  # Publish the release once all builds succeed
  publish-release:
    needs: [create-release, build-macos-arm, build-macos-intel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ needs.create-release.outputs.tag }} --draft=false
